{% extends "base.html" %}
{% block title %}Registro — ClimAlert{% endblock %}
{% block body_class %}auth-pg{% endblock %}
{% block content %}
<div class="auth-box" style="max-width:540px">
    <div class="auth-head"><span style="font-size:2.5rem">⚡</span><h1>Crear Cuenta</h1><p>Protege tu hogar ante emergencias climáticas</p></div>
    <div class="auth-card">
        <form method="POST">
            <div class="fr">
                <div class="fg"><label class="fl">Nombre completo *</label><input name="nombre" class="fi" required></div>
                <div class="fg"><label class="fl">Email *</label><input type="email" name="email" class="fi" required></div>
            </div>
            <div class="fg"><label class="fl">Contraseña *</label><input type="password" name="password" class="fi" required minlength="6"></div>
            <hr class="sep">
            <div class="fr">
                <div class="fg"><label class="fl">Provincia *</label><input name="provincia" class="fi" value="Valencia" required placeholder="Valencia"></div>
                <div class="fg"><label class="fl">Tipo de vivienda *</label>
                    <select name="tipo_vivienda" class="fs" required>
                        <option value="">Seleccionar…</option>
                        <option value="Sótano">Sótano</option>
                        <option value="Planta baja">Planta baja</option>
                        <option value="Piso alto">Piso alto</option>
                        <option value="Casa de campo">Casa de campo</option>
                    </select>
                </div>
            </div>
            <div class="fg">
                <label class="fl">Necesidades especiales</label>
                <div class="checks">
                    <label class="fc"><input type="checkbox" name="necesidades_especiales" value="Silla de ruedas"><span>Silla de ruedas</span></label>
                    <label class="fc"><input type="checkbox" name="necesidades_especiales" value="Persona dependiente"><span>Persona dependiente</span></label>
                    <label class="fc"><input type="checkbox" name="necesidades_especiales" value="Mascotas"><span>Mascotas</span></label>
                    <label class="fc"><input type="checkbox" name="necesidades_especiales" value="Movilidad reducida"><span>Movilidad reducida</span></label>
                    <label class="fc"><input type="checkbox" name="necesidades_especiales" value="Persona mayor"><span>Persona mayor</span></label>
                    <label class="fc"><input type="checkbox" name="necesidades_especiales" value="Niños pequeños"><span>Niños pequeños</span></label>
                </div>
            </div>
            <button type="submit" class="btn btn-p btn-bl mt2">Crear cuenta</button>
        </form>
    </div>
    <p class="auth-foot">¿Ya tienes cuenta? <a href="{{ url_for('login') }}">Inicia sesión</a></p>
</div>
{% endblock %}
