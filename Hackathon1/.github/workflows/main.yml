name: CI-CD

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

env:
  DOTNET_VERSION: '8.0.x'
  PROJECT_PATH: './Hackathon1/Hackathon1.csproj'
  PUBLISH_DIR: 'publish'

jobs:
  ci:
    name: Build and Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore ${{ env.PROJECT_PATH }}

      - name: Build
        run: dotnet build ${{ env.PROJECT_PATH }} --configuration Release --no-restore

      - name: Run tests (if any)
        shell: bash
        run: |
          if find ./Hackathon1 -name "*Tests.csproj" -o -name "*.Tests.csproj" | grep -q .; then
            dotnet test ./Hackathon1 --configuration Release --no-build --verbosity normal
          else
            echo "No test projects found. Skipping tests."
          fi

      - name: Publish app
        run: dotnet publish ${{ env.PROJECT_PATH }} --configuration Release --no-build --output ${{ env.PUBLISH_DIR }}

      - name: Upload publish artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-publish
          path: ${{ env.PUBLISH_DIR }}

  cd:
    name: Deploy
    runs-on: ubuntu-latest
    needs: ci
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'

    steps:
      - name: Check deploy secrets
        id: check_secrets
        shell: bash
        run: |
          if [ -z "${{ secrets.AZURE_WEBAPP_NAME }}" ] || [ -z "${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}" ]; then
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "Azure deploy secrets are missing. Skipping deploy."
          else
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Download publish artifact
        if: steps.check_secrets.outputs.enabled == 'true'
        uses: actions/download-artifact@v4
        with:
          name: app-publish
          path: ${{ env.PUBLISH_DIR }}

      - name: Deploy to Azure Web App
        if: steps.check_secrets.outputs.enabled == 'true'
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: ${{ env.PUBLISH_DIR }}
