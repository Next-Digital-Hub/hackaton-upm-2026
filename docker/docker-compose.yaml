services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: yks_db
    volumes:
      - ./mysql_data:/var/lib/mysql
    networks:
      - hackathon-network
    restart: unless-stopped
    
  backend:
    build:
      context: ../
      dockerfile: docker/Dockerfile.backend

    volumes:
      - ../backend:/app

    environment:
      - DATABASE_URL=sqlite:///yks.db

    networks:
      - hackathon-network

    restart: unless-stopped

  frontend:
    build:
      context: ../
      dockerfile: docker/Dockerfile.frontend
    ports:
      - "3000:3000"
    environment:
      - BACKEND_URL=http://backend:5000

    volumes:
      - ../frontend:/app
    networks:
      - hackathon-network
    depends_on:
      - backend

    restart: unless-stopped

networks:
  hackathon-network:
    driver: bridge

    