name: CI-CD

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

env:
  DOTNET_VERSION: '8.0.x'
  PROJECT_PATH: './Hackathon1/Hackathon1.csproj'
  PUBLISH_DIR: 'publish'

jobs:
  ci:
    name: Build and Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore ${{ env.PROJECT_PATH }}

      - name: Build
        run: dotnet build ${{ env.PROJECT_PATH }} --configuration Release --no-restore

      - name: Run tests (if any)
        shell: bash
        run: |
          if find ./Hackathon1 -name "*Tests.csproj" -o -name "*.Tests.csproj" | grep -q .; then
            dotnet test ./Hackathon1 --configuration Release --no-build --verbosity normal
          else
            echo "No test projects found. Skipping tests."
          fi

      - name: Publish app
        run: dotnet publish ${{ env.PROJECT_PATH }} --configuration Release --no-build --output ${{ env.PUBLISH_DIR }}

      - name: Upload publish artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-publish
          path: ${{ env.PUBLISH_DIR }}
